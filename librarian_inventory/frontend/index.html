<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Librarian Inventory System</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/css/auth/styles.css">
</head>
<body class="bg-gradient-to-br from-purple-50 via-blue-50 to-pink-50 min-h-screen">

    <div id="auth-section" class="min-h-screen flex items-center justify-center px-4 animate-fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
            
            <div class="auth-header-gradient p-10 text-center text-white">
                <i class="fas fa-box-archive text-5xl mb-4"></i>
                <h2 id="auth-title" class="text-3xl font-bold">Welcome Back</h2>
                <p id="auth-subtitle" class="text-purple-100 mt-2">Log in to manage your archive</p>
            </div>

            <div class="p-8">
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                        <input type="email" required class="w-full px-4 py-3 rounded-lg outline-none auth-input" placeholder="librarian@chaos.com">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                        <input type="password" required class="w-full px-4 py-3 rounded-lg outline-none auth-input" placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full btn-auth text-white font-bold py-3.5 rounded-xl shadow-lg">
                        Sign In
                    </button>
                    <p class="text-center text-sm text-gray-500 mt-4">
                        New librarian? <a href="#" onclick="toggleAuth(true)" class="text-purple-600 font-bold hover:underline">Create Account</a>
                    </p>
                </form>

                <form id="signupForm" class="space-y-5 hidden">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                        <input type="text" required class="w-full px-4 py-3 rounded-lg outline-none auth-input">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                        <input type="email" required class="w-full px-4 py-3 rounded-lg outline-none auth-input">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                        <input type="password" required class="w-full px-4 py-3 rounded-lg outline-none auth-input">
                    </div>
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-xl transition">
                        Create Account
                    </button>
                    <p class="text-center text-sm text-gray-500 mt-4">
                        Already have an account? <a href="#" onclick="toggleAuth(false)" class="text-purple-600 font-bold hover:underline">Log In</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <div id="main-app" class="container mx-auto px-4 py-8 max-w-6xl hidden">

        <header class="text-center mb-8 animate-fade-in relative">
            <button onclick="handleLogout()" class="absolute right-0 top-0 text-gray-400 hover:text-red-600 transition flex items-center gap-2">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
            <div class="flex items-center justify-center gap-3 mb-2">
                <i class="fas fa-box-archive text-purple-600 text-5xl"></i>
                <h1 class="text-5xl font-bold text-gray-800">Chaos Librarian Inventory</h1>
            </div>
            <p class="text-gray-600 text-lg">Organize your archive with intelligent bin management</p>
        </header>

        <div class="bg-white rounded-lg shadow-md p-2 mb-6 flex gap-2">
            <button onclick="switchView('list')" id="tab-list" class="flex-1 py-3 px-4 rounded-md font-medium transition flex items-center justify-center gap-2 bg-green-600 text-white">
                <i class="fas fa-list"></i> List All
            </button>
            <button onclick="switchView('add')" id="tab-add" class="flex-1 py-3 px-4 rounded-md font-medium transition flex items-center justify-center gap-2 bg-gray-100 text-gray-700 hover:bg-gray-200">
                <i class="fas fa-plus"></i> Add Item
            </button>
            <button onclick="switchView('find')" id="tab-find" class="flex-1 py-3 px-4 rounded-md font-medium transition flex items-center justify-center gap-2 bg-gray-100 text-gray-700 hover:bg-gray-200">
                <i class="fas fa-search"></i> Find Item
            </button>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-6 min-h-[400px] mb-6">
            <div id="view-add" class="view-content hidden">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                    <i class="fas fa-plus-circle text-purple-600"></i> Add New Item
                </h2>
                <form id="addItemForm" class="space-y-4">
                    <input type="text" id="itemName" placeholder="Item Name" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" required />
                    <input type="text" id="itemTags" placeholder="Tags" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" />
                    <div class="p-4 bg-purple-50 rounded-lg border border-purple-200 text-purple-700">
                        Next assignment: <strong id="nextBinDisplay">Bin-A</strong>
                    </div>
                    <button type="submit" class="w-full bg-purple-600 text-white py-3 rounded-lg font-bold hover:bg-purple-700 transition transform hover:scale-105">
                        Add to Inventory
                    </button>
                </form>
            </div>

            <div id="view-find" class="view-content hidden">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                    <i class="fas fa-magnifying-glass text-blue-600"></i> Find Items
                </h2>
                <div class="flex gap-2">
                    <input type="text" id="searchQuery" placeholder="Search..." class="flex-1 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                    <button onclick="handleSearch()" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 transition">Search</button>
                </div>
                <div id="searchResults" class="mt-6"></div>
            </div>

            <div id="view-list" class="view-content">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                    <i class="fas fa-list-ul text-green-600"></i> All Inventory Items
                </h2>
                <div id="inventoryList"></div>
            </div>
        </div>

        <div id="messageBox" class="hidden fixed top-4 right-4 p-4 rounded-lg shadow-lg max-w-md z-50 animate-slide-in"></div>

        <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fas fa-warehouse"></i> Storage Bins Status
            </h3>
            <div id="binStatus" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>
    </div>

    <script>
        /** 1. Toggle between Login and Signup forms */
        function toggleAuth(isSignup) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');

            if (isSignup) {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                title.innerText = "Join the Archive";
                subtitle.innerText = "Start organizing your chaos today";
            } else {
                signupForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                title.innerText = "Welcome Back";
                subtitle.innerText = "Log in to manage your archive";
            }
        }

        /** 2. Handle Login Form Submission */
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        });

        /** 3. Handle Logout */
        function handleLogout() {
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('auth-section').classList.remove('hidden');
        }

        /** 4. Switch Inventory Views (List/Add/Find) */
        function switchView(viewName) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            
            const tabs = ['list', 'add', 'find'];
            const colors = { list: 'bg-green-600', add: 'bg-purple-600', find: 'bg-blue-600' };

            tabs.forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                btn.className = "flex-1 py-3 px-4 rounded-md font-medium transition flex items-center justify-center gap-2 bg-gray-100 text-gray-700 hover:bg-gray-200";
            });
            
            const activeTab = document.getElementById(`tab-${viewName}`);
            activeTab.classList.remove('bg-gray-100', 'text-gray-700');
            activeTab.classList.add(colors[viewName], 'text-white');
        }

        /** 5. Search Placeholder */
        function handleSearch() {
            console.log("Searching...");
        }
    </script>

    <script src="src/js/main.js"></script>
    <script src="src/js/components/book_manager.js"></script>
    <script src="src/js/components/inventory_tracker.js"></script>
    <script src="src/js/components/reports.js"></script>
</body>
</html>
